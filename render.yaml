services:
  # Frontend Next.js
  - type: web
    name: educ-fisica-frontend
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: educ-fisica-backend
          property: host

  # Backend FastAPI
  - type: web
    name: educ-fisica-backend
    env: python
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: educ-fisica-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://educ-fisica-frontend.onrender.com"]'
      - key: DEBUG
        value: "false"

databases:
  - name: educ-fisica-db
    databaseName: educ_fisica
    plan: free
